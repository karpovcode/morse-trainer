<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#1B1B1B"/>

  <!-- Antenna stem -->
  <rect x="247" y="284" width="18" height="108" rx="9" fill="#EEDB1B" filter="url(#glow)"/>

  <!-- Antenna triangle (downward pointing) -->
  <path d="M340 108 H172 C148 108 134 134 146 154 L222 266 C234 284 278 284 290 266 L366 154 C378 134 364 108 340 108 Z"
        fill="#EEDB1B" filter="url(#glow)"/>

  <!-- Dot (green) -->
  <circle cx="176" cy="420" r="26" fill="#09FF00" filter="url(#glow-sm)"/>

  <!-- Dash (red-orange) -->
  <rect x="218" y="400" width="118" height="40" rx="12" fill="#E94615" filter="url(#glow-sm)"/>
</svg>
